<div class="row">
  <div class="col-12">

    <table class="table">
      <thead>
        <tr>
          <th>Event Name</th>
          <th>Start Date</th>
          <th>Start Time</th>
          <th>End Date</th>
          <th>Organizer Name</th>
          <th>Booking Id</th>
          <th>Booking No</th>
          <th>No Of Tickets</th>
        </tr>
      </thead>

      <tbody>

        <tr *ngFor="let item of bookeditems">
          <td>{{ item.eventName }}</td>
          <td>{{ item.startDate }}</td>
          <td>{{ item.startTime }}</td>
          <td>{{ item.endDate }}</td>
          <td>{{ item.organizerName }}</td>
          <td>{{ item.bookingId }}</td>
          <td>{{ item.bookingNo }}</td>
          <td>{{ item.noOfTickets }}</td>
        </tr>

      </tbody>

    </table>

  </div>
</div>
